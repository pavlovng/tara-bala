<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор Тара Балы</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Калькулятор Тара Балы</h1>
      <p class="ayanamsa-label">Аянамша: True Lahiri / Chitrapaksha</p>
    </header>

    <div id="loading">
      <div class="spinner"></div>
      <p>Загрузка эфемерид...</p>
    </div>

    <div id="app" class="hidden">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="auto">Авто</button>
        <button class="tab" data-tab="manual">Вручную</button>
      </div>

      <!-- AUTO mode -->
      <div id="tab-auto" class="tab-content active">
        <div class="form-group">
          <label for="birth-date">Дата рождения</label>
          <input type="date" id="birth-date" required>
        </div>
        <div class="form-group">
          <label for="birth-time">Время рождения</label>
          <input type="time" id="birth-time" step="1" required>
          <span class="error-msg hidden" id="time-error">
            Пожалуйста, укажите максимально приближённое время рождения. Без времени расчёт невозможен.
          </span>
        </div>
        <div class="form-group">
          <label for="timezone">Часовой пояс в момент рождения</label>
          <select id="timezone"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="latitude">Широта</label>
            <input type="number" id="latitude" step="0.01" min="-90" max="90" placeholder="50.11" required>
          </div>
          <div class="form-group">
            <label for="longitude">Долгота</label>
            <input type="number" id="longitude" step="0.01" min="-180" max="180" placeholder="8.68" required>
          </div>
        </div>
        <button id="btn-calc-auto" class="btn">Рассчитать</button>
      </div>

      <!-- MANUAL mode -->
      <div id="tab-manual" class="tab-content">
        <div class="form-group">
          <label for="nakshatra-select">Накшатра рождения</label>
          <select id="nakshatra-select"></select>
        </div>
        <button id="btn-calc-manual" class="btn">Рассчитать</button>
      </div>

      <!-- Result -->
      <div id="result" class="hidden">
        <h2>Результат</h2>
        <div class="result-meta" id="result-meta"></div>
        <div class="result-row">
          <span class="result-label">Накшатра рождения (по указанному часовому поясу):</span>
          <span class="result-value" id="result-janma"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Текущая накшатра:</span>
          <span class="result-value" id="result-current"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Tara Number:</span>
          <span class="result-value" id="result-tara-num"></span>
        </div>
        <div class="result-row">
          <span class="result-label">Tara Class:</span>
          <span class="result-value" id="result-tara-class"></span>
        </div>
        <div id="result-boundary" class="boundary-warning hidden"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
